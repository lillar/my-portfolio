<!DOCTYPE html>
<html>
  <head>
    <meta charset="utf-8">
    <script>
      // Redirect to the app with the path encoded as a query param
      var path = window.location.pathname.replace('/my-portfolio', '');
      window.location.replace(
        '/my-portfolio/?redirect=' + encodeURIComponent(path)
      );
    </script>
  </head>
  <body></body>
</html>
